spring.application.name=bitewise-web-services

# Database Configuration - Render PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bitewise_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345678}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10

# Logging
logging.level.root=INFO
logging.level.com.bitewise=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Server Configuration - Render uses PORT environment variable
server.port=${PORT:8080}
server.servlet.context-path=/

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly1234567890}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Application Version
app.version=0.0.1-SNAPSHOT
app.name=BiteWise API

edamam.api.url=https://api.edamam.com/api/meal-planner/v1
edamam.api.app-id=${EDAMAM_APP_ID:6683b08a}
edamam.api.app-key=${EDAMAM_APP_KEY:4fe8c976bb09a41e7284a877c47d4adb}

