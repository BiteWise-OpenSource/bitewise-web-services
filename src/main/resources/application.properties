spring.application.name=bitewise-web-services

spring.datasource.url=jdbc:postgresql://localhost:5432/bitewise_db
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10

logging.level.root=INFO
logging.level.com.bitewise=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

server.port=8080
server.servlet.context-path=/

app.jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly1234567890
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Application Version
app.version=0.0.1-SNAPSHOT
app.name=BiteWise API

# Edamam API Configuration (Recipe Search API v2 - registrate en developer.edamam.com)
edamam.api.url=https://api.edamam.com/api/recipes/v2
edamam.api.app-id=${EDAMAM_APP_ID:demo-app-id}
edamam.api.app-key=${EDAMAM_APP_KEY:demo-app-key}

